<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Школьные игры</title>
    
    <!-- VK Bridge -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 1.8em;
            margin-bottom: 10px;
        }
        
        .content {
            padding: 25px;
        }
        
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }
        
        .school-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .other-btn {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            color: white;
        }
        
        .submit-btn {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            color: white;
        }
        
        input, select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1em;
            margin-bottom: 15px;
        }
        
        .hidden {
            display: none;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            font-size: 0.9em;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Школьные игры</h1>
            <p>Выбери игру и найди команду</p>
        </div>
        
        <div class="content">
            <!-- Основная кнопка выбора школы -->
            <button class="school-btn" onclick="toggleSchoolMode()" id="schoolMainBtn">
                <span id="schoolBtnText">Выбрать школу</span>
            </button>
            
            <!-- Поле для ручного ввода (скрыто) -->
            <input type="text" id="manualSchool" class="hidden" placeholder="Введите название школы">
            
            <!-- Кнопка переключения режима -->
            <button class="other-btn" onclick="toggleSchoolMode()" id="toggleModeBtn">
                Другая школа
            </button>
            
            <!-- Выбор игры -->
            <select id="game">
                <option value="" disabled selected>Выберите игру</option>
                <option value="ks_2x2">КС (2x2)</option>
                <option value="ks_5x5">КС (5x5)</option>
                <option value="dota">Дота 2</option>
                <option value="minecraft">Майнкрафт</option>
                <option value="roblox">Роблокс</option>
                <option value="valorant">Валорант</option>
            </select>
            
            <!-- Кнопка отправки -->
            <button class="submit-btn" onclick="sendApplication()">
                Отправить заявку
            </button>
            
            <!-- Кнопка "Мои заявки" -->
            <button class="other-btn" onclick="showMyApps()">
                Мои заявки
            </button>
        </div>
        
        <div class="footer">
            <p>Если долго грузится, подождите минуту</p>
        </div>
    </div>

    <script>
        // Инициализация VK Bridge
        vkBridge.send('VKWebAppInit');
        
        const SERVER_URL = 'https://vk-school-app-server.onrender.com';
        let isManualMode = false;
        
        // Переключение между выбором из списка и ручным вводом
        function toggleSchoolMode() {
            const manualInput = document.getElementById('manualSchool');
            const mainBtn = document.getElementById('schoolMainBtn');
            const toggleBtn = document.getElementById('toggleModeBtn');
            
            if (isManualMode) {
                // Переключаемся на список
                manualInput.classList.add('hidden');
                mainBtn.innerHTML = '<span id="schoolBtnText">Выбрать школу</span>';
                toggleBtn.textContent = 'Другая школа';
                isManualMode = false;
            } else {
                // Переключаемся на ручной ввод
                manualInput.classList.remove('hidden');
                mainBtn.innerHTML = '<span id="schoolBtnText">Введите название школы</span>';
                toggleBtn.textContent = 'Выбрать из списка';
                isManualMode = true;
            }
        }
        
        // Получение названия школы
        function getSchoolName() {
            if (isManualMode) {
                return document.getElementById('manualSchool').value.trim();
            } else {
                return document.getElementById('schoolBtnText').textContent;
            }
        }
        
        // Отправка заявки
        async function sendApplication() {
            const school = getSchoolName();
            const game = document.getElementById('game').value;
            
            if (!school || school === 'Выбрать школу' || school === 'Введите название школы') {
                alert('Пожалуйста, выберите или введите школу');
                return;
            }
            
            if (!game) {
                alert('Пожалуйста, выберите игру');
                return;
            }
            
            try {
                const user = await vkBridge.send('VKWebAppGetUserInfo');
                
                let phoneData;
                try {
                    phoneData = await vkBridge.send('VKWebAppGetPhoneNumber');
                } catch {
                    alert('Для записи на турнир нужно поделиться телефоном');
                    return;
                }
                
                const gameNames = {
                    'ks_2x2': 'КС 2x2',
                    'ks_5x5': 'КС 5x5',
                    'dota': 'Дота 2',
                    'minecraft': 'Майнкрафт',
                    'roblox': 'Роблокс',
                    'valorant': 'Валорант'
                };
                
                const payload = {
                    vk_id: user.id,
                    name: `${user.first_name} ${user.last_name}`,
                    school_name: school,
                    game_id: game,
                    game_name: gameNames[game],
                    phone: phoneData.phone_number,
                    date: new Date().toISOString()
                };
                
                const response = await fetch(`${SERVER_URL}/save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if (result.status === 'already_exists') {
                    alert('Вы уже участвуете в этой игре!');
                } else {
                    alert('✅ Заявка отправлена! Удачи в игре!');
                }
                
            } catch (error) {
                alert('Ошибка при отправке. Попробуйте ещё раз');
                console.error(error);
            }
        }
        
        // Мои заявки (упрощенно)
        async function showMyApps() {
            try {
                const user = await vkBridge.send('VKWebAppGetUserInfo');
                const response = await fetch(`${SERVER_URL}/user-applications?user_id=${user.id}`);
                const data = await response.json();
                
                if (data.applications && data.applications.length > 0) {
                    let message = 'Ваши заявки:\n';
                    data.applications.forEach(app => {
                        message += `\n🎮 ${app.game_name}\n🏫 ${app.school_name}\n`;
                    });
                    alert(message);
                } else {
                    alert('У вас пока нет заявок');
                }
            } catch (error) {
                alert('Ошибка загрузки заявок');
            }
        }
        
        // Проверка соединения с сервером
        fetch(`${SERVER_URL}/`).catch(() => {});
    </script>
</body>
</html>
