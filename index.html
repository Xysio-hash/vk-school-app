<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Школьные игры</title>
    
    <!-- VK Bridge -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1em;
            font-weight: 300;
        }
        
        .header i {
            font-size: 3em;
            margin-bottom: 15px;
        }
        
        .content {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 500;
            font-size: 1.1em;
        }
        
        .form-group label i {
            margin-right: 10px;
            color: #667eea;
        }
        
        /* Кнопка выбора школы */
        .school-select-btn {
            width: 100%;
            padding: 15px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        /* Кнопка другой школы */
        .other-school-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        /* Поле ручного ввода */
        .manual-school-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1em;
            margin-bottom: 15px;
        }
        
        .manual-school-input:focus {
            outline: none;
            border-color: #ff9800;
        }
        
        /* Выбор игры */
        .compact-select {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            background: white;
            font-size: 1em;
            color: #333;
            cursor: pointer;
        }
        
        /* Кнопка отправки */
        .btn-submit {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
        }
        
        /* Кнопка мои заявки */
        .my-applications-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #4a76a8 0%, #6383a8 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
        }
        
        /* Кнопка админа */
        #adminButton {
            background: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
            display: none;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #666;
            font-size: 0.9em;
            border-top: 1px solid #e0e0e0;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .confirm-modal.show {
            opacity: 1;
            visibility: visible;
        }
        
        .confirm-content {
            background: white;
            border-radius: 30px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            transform: translateY(20px);
            transition: all 0.3s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .confirm-modal.show .confirm-content {
            transform: translateY(0);
        }
        
        .confirm-icon {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .confirm-icon i {
            font-size: 4em;
            color: #ff9800;
        }
        
        .confirm-title {
            text-align: center;
            font-size: 1.5em;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }
        
        .confirm-text {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        
        .confirm-buttons {
            display: flex;
            gap: 15px;
        }
        
        .confirm-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: 500;
            cursor: pointer;
        }
        
        .confirm-btn.yes {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            color: white;
        }
        
        .confirm-btn.no {
            background: linear-gradient(135deg, #f44336 0%, #e53935 100%);
            color: white;
        }
        
        .applications-popup {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .applications-popup.show {
            opacity: 1;
            visibility: visible;
        }
        
        .popup-content {
            background: white;
            border-radius: 30px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .popup-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .popup-header i {
            color: #999;
            cursor: pointer;
            font-size: 1.5em;
        }
        
        .application-item {
            padding: 15px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid #e0e0e0;
        }
        
        .application-game {
            font-weight: 600;
            margin-bottom: 5px;
            color: #667eea;
        }
        
        .application-school {
            font-size: 0.9em;
            color: #666;
        }
        
        .application-date {
            font-size: 0.8em;
            color: #999;
            margin-top: 5px;
        }
        
        .empty-applications {
            text-align: center;
            padding: 30px;
            color: #999;
        }
        
        .vk-message {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin: 15px 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border: 1px solid #e0e0e0;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        .vk-message.show {
            display: block;
        }
        
        .vk-message.warning {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
        }
        
        .vk-message.success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
        }
        
        .vk-message.error {
            background: #ffebee;
            border-left: 4px solid #f44336;
        }
        
        .vk-message.info {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
        }
        
        .vk-message-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .vk-message-icon {
            font-size: 24px;
            min-width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .vk-message-text {
            flex: 1;
            font-size: 1em;
            line-height: 1.4;
            color: #333;
        }
        
        .vk-message-text strong {
            display: block;
            margin-bottom: 5px;
            font-size: 1.1em;
        }
        
        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.5em;
            }
            .confirm-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <i class="fas fa-gamepad"></i>
            <h1>Школьные игры</h1>
            <p>Выбери игру и найди команду</p>
        </div>
        
        <!-- Блок для сообщений -->
        <div id="vkMessage" class="vk-message">
            <div class="vk-message-content">
                <div class="vk-message-icon">
                    <i class="fas fa-info-circle"></i>
                </div>
                <div class="vk-message-text">
                    <strong>Внимание</strong>
                    <span id="messageText">Текст сообщения</span>
                </div>
            </div>
        </div>
        
        <div class="content">
            <!-- Кнопка "Выбрать школу" -->
            <button class="school-select-btn" id="selectedSchoolDisplay" onclick="toggleManualSchool()">
                <i class="fas fa-school"></i>
                Выбрать школу
                <i class="fas fa-chevron-down"></i>
            </button>
            
            <!-- Поле для ручного ввода школы (изначально скрыто) -->
            <input type="text" class="manual-school-input" id="manualSchool" placeholder="Введите название вашей школы" style="display: none;">
            
            <!-- Кнопка "Другая школа" (для переключения режима) -->
            <button class="other-school-btn" id="otherSchoolBtn" onclick="toggleManualSchool()">
                <i class="fas fa-pen"></i>
                Другая школа (ввести вручную)
            </button>
            
            <!-- Выбор игры -->
            <div class="form-group">
                <label>
                    <i class="fas fa-gamepad"></i>
                    Выберите игру
                </label>
                <select id="game" class="compact-select">
                    <option value="" disabled selected>🎮 Выберите игру</option>
                    <option value="ks_2x2">🎮 КС (2x2)</option>
                    <option value="ks_5x5">🎯 КС (5x5)</option>
                    <option value="dota">⚔️ Дота 2</option>
                    <option value="minecraft">⛏️ Майнкрафт</option>
                    <option value="roblox">🎲 Роблокс</option>
                    <option value="valorant">🔫 Валорант</option>
                </select>
            </div>
            
            <!-- Кнопка отправки -->
            <button class="btn-submit" onclick="checkBeforeSubmit()">
                <i class="fas fa-paper-plane"></i>
                Отправить
            </button>
            
            <!-- Кнопка "Мои заявки" -->
            <button class="my-applications-btn" onclick="showMyApplications()">
                <i class="fas fa-list"></i>
                Мои заявки
            </button>
            
            <!-- Кнопка для админа -->
            <button class="my-applications-btn" id="adminButton" onclick="showAdminPanel()">
                <i class="fas fa-crown"></i>
                Админ-панель
            </button>
        </div>
        
        <!-- Кнопки сообществ -->
        <div style="padding: 0 30px 30px 30px; display: flex; flex-direction: column; gap: 10px;">
            <a href="https://vk.com/colizeum_kolhoznaya" target="_blank" style="text-decoration: none;">
                <button class="community-button" style="width: 100%; padding: 15px; background: white; border: 2px solid #e0e0e0; border-radius: 15px; display: flex; align-items: center; justify-content: space-between;">
                    <span><i class="fab fa-vk" style="color: #4a76a8; font-size: 1.5em; margin-right: 10px;"></i> Colizeum</span>
                    <i class="fas fa-chevron-right"></i>
                </button>
            </a>
            <a href="https://vk.com/cyberleague67" target="_blank" style="text-decoration: none;">
                <button class="community-button" style="width: 100%; padding: 15px; background: white; border: 2px solid #e0e0e0; border-radius: 15px; display: flex; align-items: center; justify-content: space-between;">
                    <span><i class="fab fa-vk" style="color: #4a76a8; font-size: 1.5em; margin-right: 10px;"></i> КиберЛига</span>
                    <i class="fas fa-chevron-right"></i>
                </button>
            </a>
        </div>
        
        <div class="footer">
            <p>
                <i class="fas fa-clock"></i>
                Если у вас долго грузится отправление, просим подождать пару минут или перезайти в приложение, сервера уже подгружаются!
            </p>
        </div>
    </div>

    <!-- Модальное окно подтверждения -->
    <div id="confirmModal" class="confirm-modal" onclick="hideConfirmModal(event)">
        <div class="confirm-content">
            <div class="confirm-icon">
                <i class="fas fa-question-circle"></i>
            </div>
            <div class="confirm-title">
                Подтверждение
            </div>
            <div class="confirm-text" id="confirmText">
                Вы уверены что ввели правильно данные и готовы продолжить?
            </div>
            <div class="confirm-buttons">
                <button class="confirm-btn yes" onclick="processSendData()">
                    <i class="fas fa-check"></i>
                    Да, продолжить
                </button>
                <button class="confirm-btn no" onclick="hideConfirmModal()">
                    <i class="fas fa-times"></i>
                    Нет, проверить
                </button>
            </div>
        </div>
    </div>

    <!-- Попап "Мои заявки" -->
    <div id="applicationsPopup" class="applications-popup" onclick="hideApplicationsPopup(event)">
        <div class="popup-content">
            <div class="popup-header">
                <h3>Мои заявки</h3>
                <i class="fas fa-times" onclick="hideApplicationsPopup()"></i>
            </div>
            <div id="applicationsList">
                <div class="empty-applications">Загрузка...</div>
            </div>
        </div>
    </div>

    <script>
        vkBridge.send('VKWebAppInit');

        const SERVER_URL = 'https://vk-school-app-server.onrender.com';
        let selectedSchool = '';
        let isManualMode = false;
        let soundEnabled = true;

        // Переключение режима выбора школы
        function toggleManualSchool() {
            const manualInput = document.getElementById('manualSchool');
            const otherBtn = document.getElementById('otherSchoolBtn');
            const displayBtn = document.getElementById('selectedSchoolDisplay');
            
            if (manualInput.style.display === 'none') {
                // Переключаемся на ручной ввод
                manualInput.style.display = 'block';
                otherBtn.innerHTML = '<i class="fas fa-list"></i> Выбрать из списка';
                displayBtn.innerHTML = '<i class="fas fa-school"></i> Другая школа <i class="fas fa-chevron-down"></i>';
                isManualMode = true;
            } else {
                // Переключаемся на выбор из списка (упрощённо - просто скрываем поле)
                manualInput.style.display = 'none';
                otherBtn.innerHTML = '<i class="fas fa-pen"></i> Другая школа (ввести вручную)';
                displayBtn.innerHTML = '<i class="fas fa-school"></i> Выбрать школу <i class="fas fa-chevron-down"></i>';
                isManualMode = false;
                selectedSchool = '';
            }
        }

        // Получить название школы
        function getSchoolName() {
            if (isManualMode) {
                return document.getElementById('manualSchool').value.trim();
            } else {
                return ''; // В упрощённой версии пока нет списка
            }
        }

        // Проверка перед отправкой
        async function checkBeforeSubmit() {
            const school = getSchoolName();
            const game = document.getElementById('game').value;
            
            if (!school || !game) {
                alert("Выберите школу и игру!");
                return;
            }
            
            document.getElementById('confirmModal').classList.add('show');
        }

        function hideConfirmModal(e) {
            if (!e || e.target.classList.contains('confirm-modal')) {
                document.getElementById('confirmModal').classList.remove('show');
            }
        }

        // Отправка данных
        async function processSendData() {
            const school = getSchoolName();
            const game = document.getElementById('game').value;
            const gameText = document.getElementById('game').selectedOptions[0].text;
            
            if (!school || !game) {
                alert("Пожалуйста, укажите школу и игру");
                hideConfirmModal();
                return;
            }
            
            const btn = document.querySelector('.btn-submit');
            const originalText = btn.innerHTML;
            
            try {
                btn.innerHTML = '<span class="loading"></span> Отправка...';
                btn.disabled = true;
                
                const user = await vkBridge.send('VKWebAppGetUserInfo');
                
                let phoneData;
                try {
                    phoneData = await vkBridge.send("VKWebAppGetPhoneNumber");
                } catch {
                    alert("Для записи на турнир нужно поделиться телефоном");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    hideConfirmModal();
                    return;
                }
                
                const payload = {
                    vk_id: user.id,
                    name: `${user.first_name} ${user.last_name}`,
                    school_name: school,
                    game_id: game,
                    game_name: gameText,
                    phone: phoneData.phone_number,
                    date: new Date().toISOString()
                };
                
                const response = await fetch(`${SERVER_URL}/save`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if (result.google) {
                    alert("Твой выбор сохранён в Google таблицу! Удачи в игре!");
                } else {
                    alert("Твой выбор сохранён! Удачи в игре!");
                }
            } catch (error) {
                alert("Ошибка. Попробуйте ещё раз");
                console.error(error);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                hideConfirmModal();
            }
        }

        // Показать мои заявки
        async function showMyApplications() {
            const listDiv = document.getElementById('applicationsList');
            listDiv.innerHTML = '<div class="empty-applications">Загрузка...</div>';
            document.getElementById('applicationsPopup').classList.add('show');
            
            try {
                const user = await vkBridge.send('VKWebAppGetUserInfo');
                const response = await fetch(`${SERVER_URL}/user-applications?user_id=${user.id}`);
                const data = await response.json();
                const apps = data.applications || [];
                
                if (apps.length === 0) {
                    listDiv.innerHTML = '<div class="empty-applications">У вас пока нет заявок</div>';
                } else {
                    let html = '';
                    apps.forEach(app => {
                        const date = new Date(app.date).toLocaleString('ru-RU', { 
                            day: '2-digit', month: '2-digit', year: 'numeric', 
                            hour: '2-digit', minute: '2-digit' 
                        });
                        html += `
                            <div class="application-item">
                                <div class="application-game">${app.game_name}</div>
                                <div class="application-school">${app.school_name}</div>
                                <div class="application-date">${date}</div>
                            </div>
                        `;
                    });
                    listDiv.innerHTML = html;
                }
            } catch (error) {
                listDiv.innerHTML = '<div class="empty-applications">Ошибка загрузки</div>';
            }
        }

        function hideApplicationsPopup(e) {
            if (!e || e.target.classList.contains('applications-popup')) {
                document.getElementById('applicationsPopup').classList.remove('show');
            }
        }

        // Проверка админа
        async function checkAdminOnLoad() {
            try {
                const user = await vkBridge.send('VKWebAppGetUserInfo');
                const response = await fetch(`${SERVER_URL}/api/check-admin?user_id=${user.id}`);
                const data = await response.json();
                
                if (data.isAdmin) {
                    document.getElementById('adminButton').style.display = 'flex';
                }
            } catch (error) {
                console.error('Ошибка проверки админа:', error);
            }
        }

        // Админ-панель (упрощённая)
        async function showAdminPanel() {
            alert('Админ-панель в разработке');
        }

        // Запуск при загрузке
        window.addEventListener('load', () => {
            checkAdminOnLoad();
        });
    </script>
</body>
</html>
